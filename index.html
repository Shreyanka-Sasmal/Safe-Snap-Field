<!DOCTYPE html>
<html>
<head>
  <title>SafeAI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 80%;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      border: none;
      background: blue;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>SafeAI</h1>
  <p>AI-powered protection for your private images</p>

  <div class="box">
    <h2>Features</h2>
    <p>✔ Real-time alerts</p>
    <p>✔ One-click takedown</p>
    <p>✔ Secure dashboard</p>
  </div>

  <div class="box">
    <h2>Pricing</h2>
    <h3>₹299/month</h3>
    <button>Subscribe</button>
  </div>

  <div class="box">
    <h2>Sign Up</h2>
    <input type="email" placeholder="Email"><br><br>
    <input type="password" placeholder="Password"><br><br>
    <button>Create Account</button>
  </div>

  <div class="box">
    <h2>Contact</h2>
    <p>Email: support@safeai.com</p>
  </div>

</body>
</html>
